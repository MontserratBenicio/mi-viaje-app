<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Transporte</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
        }
        h2 { color: #1a1a1a; margin-bottom: 10px; font-size: 22px; }
        .address-box { 
            background: #f8f9fa; 
            border: 1px solid #e9ecef; 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            font-size: 14px; 
            color: #495057; 
            line-height: 1.4;
        }
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            padding: 18px; 
            margin: 12px 0; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            text-decoration: none; 
            color: white; 
            transition: transform 0.1s ease;
        }
        .btn:active { transform: scale(0.96); }
        .uber { background-color: #000000; }
        .maps { background-color: #4285F4; }
        .icon { margin-right: 10px; font-size: 18px; }
    </style>
</head>
<body>

<div class="card">
    <h2>¿A dónde vamos?</h2>
    <div class="address-box">
        <strong>Destino:</strong><br>
        Centro Cristiano Calacoaya<br>
        <small>Cam. Real de Calacoaya 17</small>
    </div>

    <button onclick="lanzarUber()" class="btn uber">
        <span class="icon">🚗</span> Solicitar Uber
    </button>
    
    <button onclick="lanzarMaps()" class="btn maps">
        <span class="icon">📍</span> Ver en Maps
    </button>
</div>

<script>
    // Coordenadas exactas del destino
    const destinoLat = 19.53034;
    const destinoLon = -99.25203;
    const nombreLugar = encodeURIComponent("Centro Cristiano Calacoaya");

    function lanzarUber() {
        // Enlace optimizado con Coordenadas + Nombre del lugar
        // Esto es mucho más robusto para iOS
        const uberURL = `https://m.uber.com/ul/?action=setPickup&pickup=my_location&dropoff[latitude]=${destinoLat}&dropoff[longitude]=${destinoLon}&dropoff[formatted_address]=${nombreLugar}`;
        
        window.location.href = uberURL;
    }

    function lanzarMaps() {
        // Google Maps también funciona mejor con coordenadas directas
        const mapsURL = `http://googleusercontent.com/maps.google.com/4{destinoLat},${destinoLon}`;
        
        window.open(mapsURL, '_blank');
    }
</script>

</body>
</html>
