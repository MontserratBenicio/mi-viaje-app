<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Transporte</title>
    <style>
        /* ESTO EVITA QUE LA IMAGEN SE DISTORSIONE */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Evita scrolls raros en móviles */
        }

        .fondo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('vertical2.jpg');
            background-size: cover;    /* Cubre todo sin deformar */
            background-position: center; /* Centra la imagen */
            background-repeat: no-repeat;
            z-index: -1; /* Lo manda al fondo */
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
        }

        h2 { color: #1a1a1a; margin-bottom: 10px; font-size: 22px; }

        .address-box { 
            background: #f8f9fa; 
            border: 1px solid #e9ecef; 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            font-size: 14px; 
            color: #495057; 
            line-height: 1.4;
            text-align: center;
        }

        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            padding: 18px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            text-decoration: none; 
            color: white; 
            transition: transform 0.1s ease;
        }

        .btn:active { transform: scale(0.96); }
        .uber { background-color: #000000; }
        .maps { background-color: #4285F4; }
        .apple { background-color: #555555; }
        .icon { margin-right: 10px; font-size: 18px; }
    </style>
</head>
<body>

<div class="fondo"></div>

<div class="card">
    <h2>¿A dónde vamos?</h2>
    <div class="address-box">
        <strong>Destino:</strong><br>
        Centro Cristiano Calacoaya, Cam. Real de Calacoaya 17, Calacoaya, 52985 Cdad. López Mateos, Méx.
    </div>

    <button onclick="lanzarUber()" class="btn uber">
        <span class="icon">🚗</span> Solicitar Uber
    </button>
    
    <button onclick="lanzarGoogleMaps()" class="btn maps">
        <span class="icon">📍</span> Ver en Google Maps
    </button>

    <button onclick="lanzarAppleMaps()" class="btn apple">
        <span class="icon">🍎</span> Ver en Apple Maps
    </button>
</div>

<script>
    const direccionDestino = "Centro Cristiano Calacoaya, Cam. Real de Calacoaya 17, Calacoaya, 52985 Cdad. López Mateos, Méx.";
    const destinoURL = encodeURIComponent(direccionDestino);

    function lanzarUber() {
        const app = `uber://?action=setPickup&pickup=my_location&dropoff[formatted_address]=${destinoURL}`;
        const web = `https://m.uber.com/ul/?action=setPickup&pickup=my_location&dropoff[formatted_address]=${destinoURL}`;
        window.location.href = app;
        setTimeout(() => { window.location.href = web; }, 1500);
    }
    
    function lanzarGoogleMaps() {
        const url = `https://www.google.com/maps/dir/?api=1&destination=${destinoURL}&travelmode=driving`;
        window.open(url, '_blank');
    }

    function lanzarAppleMaps() {
        const url = `http://maps.apple.com/?daddr=${destinoURL}&dirflg=d`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
