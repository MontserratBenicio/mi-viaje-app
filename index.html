<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Transporte - Soy de Cristo</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            
            /* Configuración de la imagen de fondo */
            background-image: url('vertical2.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #000; /* Fondo negro de respaldo */

            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .card { 
            background: rgba(0, 0, 0, 0.75); /* Fondo oscuro translúcido */
            backdrop-filter: blur(10px);    /* Efecto de desenfoque cristalino */
            -webkit-backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            width: 85%; 
            max-width: 360px; 
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1); /* Borde sutil */
        }

        h2 { 
            color: #ffffff; 
            margin-bottom: 10px; 
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .address-box { 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            font-size: 14px; 
            color: #e0e0e0; 
            line-height: 1.5;
        }

        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            padding: 16px; 
            margin: 12px 0; 
            border: none; 
            border-radius: 14px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            text-decoration: none; 
            color: white; 
            transition: all 0.2s ease;
        }

        .btn:active { transform: scale(0.97); }

        /* Colores inspirados en la marca y apps */
        .uber { background-color: #ffffff; color: #000; }
        .maps { background-color: #ff3b30; } /* Rojo para combinar con tu imagen */
        .apple { background-color: #444; }

        .icon { margin-right: 12px; font-size: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>¿A dónde vamos?</h2>
    <div class="address-box">
        <strong style="color: #ff3b30;">Destino:</strong><br>
        Centro Cristiano Calacoaya, Cam. Real de Calacoaya 17, Calacoaya, 52985 Cdad. López Mateos, Méx.
    </div>

    <button onclick="lanzarUber()" class="btn uber">
        <span class="icon">🚗</span> Solicitar Uber
    </button>
    
    <button onclick="lanzarGoogleMaps()" class="btn maps">
        <span class="icon">📍</span> Ver en Google Maps
    </button>

    <button onclick="lanzarAppleMaps()" class="btn apple">
        <span class="icon">🍎</span> Ver en Apple Maps
    </button>
</div>

<script>
    const direccionDestino = "Centro Cristiano Calacoaya, Cam. Real de Calacoaya 17, Calacoaya, 52985 Cdad. López Mateos, Méx.";
    const destinoURL = encodeURIComponent(direccionDestino);

    function lanzarUber() {
        const app = `uber://?action=setPickup&pickup=my_location&dropoff[formatted_address]=${destinoURL}`;
        const web = `https://m.uber.com/ul/?action=setPickup&pickup=my_location&dropoff[formatted_address]=${destinoURL}`;

        window.location.href = app;
        setTimeout(() => { window.location.href = web; }, 1500);
    }
    
    function lanzarGoogleMaps() {
        const url = `https://www.google.com/maps/dir/?api=1&destination=${destinoURL}&travelmode=driving`;
        window.open(url, '_blank');
    }

    function lanzarAppleMaps() {
        const url = `http://maps.apple.com/?daddr=${destinoURL}&dirflg=d`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
