<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soy de Cristo</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            
            /* Ajustes para que sea responsivo */
            background-image: url('vertical2.jpg'); 
            background-size: cover;        /* Cubre toda la pantalla */
            background-position: center;   /* Siempre centrada */
            background-attachment: fixed;  /* El fondo no se mueve al scrollear */
            background-repeat: no-repeat;
            background-color: #000;

            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; /* Usa min-height para mejor soporte en móvil */
            margin: 0; 
        }

        /* Ajuste extra para PC (pantallas anchas) */
        @media (min-width: 768px) {
            body {
                background-position: center 20%; /* Ajusta un poco el encuadre en monitores */
            }
        }

        .card { 
            background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(12px);    
            -webkit-backdrop-filter: blur(12px);
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            width: 85%; 
            max-width: 360px; 
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin: 20px; /* Margen para que no toque los bordes en móviles pequeños */
        }

        h2 { 
            color: #ffffff; 
            margin-bottom: 10px; 
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .address-box { 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            font-size: 14px; 
            color: #efefef; 
            line-height: 1.5;
        }

        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            padding: 16px; 
            margin: 12px 0; 
            border: none; 
            border-radius: 14px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            text-decoration: none; 
            color: white; 
            transition: all 0.2s ease;
        }

        .btn:active { transform: scale(0.96); }

        .uber { background-color: #ffffff; color: #000; }
        .maps { background-color: #ff3b30; } 
        .apple { background-color: #444; }

        .icon { margin-right: 12px; font-size: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Soy De Cristo En Movimiento</h2>

    <div class="address-box">
        <strong style="color: #ff3b30;">Destino:</strong><br>
        Centro Cristiano Calacoaya, Cam. Real de Calacoaya 17, Calacoaya, 52985 Cdad. López Mateos, Méx.
    </div>

    <button onclick="lanzarUber()" class="btn uber">
        <span class="icon">🚗</span> Solicitar Uber
    </button>
    
    <button onclick="lanzarGoogleMaps()" class="btn maps">
        <span class="icon">📍</span> Ver en Google Maps
    </button>

    <button onclick="lanzarAppleMaps()" class="btn apple">
        <span class="icon">🍎</span> Ver en Apple Maps
    </button>
</div>

<script>
    const direccionDestino = "Centro Cristiano Calacoaya, Cam. Real de Calacoaya 17, Calacoaya, 52985 Cdad. López Mateos, Méx.";
    const destinoURL = encodeURIComponent(direccionDestino);

    function lanzarUber() {
        const app = `uber://?action=setPickup&pickup=my_location&dropoff[formatted_address]=${destinoURL}`;
        const web = `https://m.uber.com/ul/?action=setPickup&pickup=my_location&dropoff[formatted_address]=${destinoURL}`;

        window.location.href = app;
        setTimeout(() => { window.location.href = web; }, 1500);
    }
    
    function lanzarGoogleMaps() {
        const url = `https://www.google.com/maps/dir/?api=1&destination=${destinoURL}&travelmode=driving`;
        window.open(url, '_blank');
    }

    function lanzarAppleMaps() {
        const url = `http://maps.apple.com/?daddr=${destinoURL}&dirflg=d`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
